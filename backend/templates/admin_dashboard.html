{{template "layout" .}}

{{define "title"}}Dashboard de Admin{{end}}

{{define "admin-dashboard-content"}}
<div class="container mt-4">
    <h1 class="h3 mb-4">Dashboard de Administración</h1>

    <div class="row">
        <div class="col-md-6 col-lg-4">
            <div class="card text-white bg-primary mb-3 shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <i class="bi bi-people-fill" style="font-size: 3rem;"></i>
                        <div class="text-end">
                            <h3 class="card-title mb-0" id="totalUsuarios">...</h3>
                            <p class="card-text mb-0">Usuarios Registrados</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>

    <div class="row mt-3">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0">Ejercicios Más Populares</h5>
                </div>
                <div class="card-body">
                    <ul class="list-group list-group-flush" id="ejerciciosPopulares">
                        <li class="list-group-item text-center">
                            <span class="spinner-border spinner-border-sm"></span> Cargando...
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts-admin-dashboard"}}
<script src="/static/js/admin_dashboard.js"></script>
{{end}}
